<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
</head>
<body>

<input id="msg" placeholder="Enter message"/>
<input id="room" placeholder="Enter roomId" value="room1"/>
<button onclick="sendMessage()">Send</button>

<ul id="messages"></ul>

<script>
    let socket = new SockJS("http://localhost:8083/ws");
    let stompClient = Stomp.over(socket);

    let roomId = document.getElementById("room").value;

    const TOKEN = "Bearer YOUR_JWT_TOKEN";

    stompClient.connect({
        Authorization: TOKEN
    }, function () {

        roomId = document.getElementById("room").value;

        stompClient.subscribe("/topic/room/" + roomId, function (message) {

            let msg = JSON.parse(message.body);

            let li = document.createElement("li");
            li.innerText = msg.sender + ": " + msg.content;

            document.getElementById("messages").appendChild(li);
        });
    });

    function sendMessage() {
        let content = document.getElementById("msg").value;
        let roomId = document.getElementById("room").value;

        stompClient.send("/app/sendMessage", {}, JSON.stringify({
            sender: "user1",
            content: content,
            roomId: roomId
        }));

        document.getElementById("msg").value = "";
    }
</script>

</body>
</html>
