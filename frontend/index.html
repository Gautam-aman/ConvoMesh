<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>

    <!-- SockJS + STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
</head>
<body>

<h2>Chat Application</h2>

<input id="msg" placeholder="Enter message"/>
<input id="room" placeholder="Enter roomId" value="room1"/>
<button onclick="sendMessage()">Send</button>

<ul id="messages"></ul>

<script>
    let stompClient = null;

    function connect() {
        // 🔥 IMPORTANT: Use SockJS (NOT WebSocket)
        const socket = new SockJS("http://localhost:8083/ws");
        stompClient = Stomp.over(socket);

        // Optional: disable logs
        stompClient.debug = null;

        stompClient.connect({}, function (frame) {
            console.log("Connected: " + frame);

            const roomId = document.getElementById("room").value;

            // 🔥 Subscribe to correct topic
            stompClient.subscribe("/topic/room/" + roomId, function (message) {
                const msg = JSON.parse(message.body);

                const li = document.createElement("li");
                li.innerText = msg.sender + ": " + msg.content;

                document.getElementById("messages").appendChild(li);
            });
        }, function (error) {
            console.error("Connection error:", error);
        });
    }

    function sendMessage() {
        const content = document.getElementById("msg").value;
        const roomId = document.getElementById("room").value;

        if (!content || !stompClient) return;

        stompClient.send("/app/sendMessage", {}, JSON.stringify({
            sender: "user1",
            content: content,
            roomId: roomId
        }));

        document.getElementById("msg").value = "";
    }

    // 🔥 Auto connect on load
    connect();
</script>

</body>
</html>
